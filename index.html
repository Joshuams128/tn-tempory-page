<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRUE NORTH PARTY RENTALS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: url('img/background22.png') center / cover no-repeat;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .hero-content {
      position: relative;
      color: #fff;
      max-width: 900px;
    }

    .hero-content h1 {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.3;
      margin-bottom: 2.5rem;
    }

    .hero-content p {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .hero-content a {
      color: #fff;
      text-decoration: none;
    }

    .hero-content a:hover {
      text-decoration: underline;
    }

    footer {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 2.5rem 1.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.85rem;
      line-height: 2.4;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }

    footer a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-content">
      <h1>We Are Working On Improving Our Website</h1>
      <p>Contact Us At</p>
      <p><a href="mailto:truenorthpartyrentals@gmail.com">truenorthpartyrentals@gmail.com</a></p>
    </div>
  </section>

  <footer>
    <p>True North Party Rentals</p>
    <p>1275 Morningside Ave #30, Scarborough, ON, Canada</p>
    <p><a href="tel:+16479063400">+1.6479063400</a></p>
  </footer>

</body>
</html>
